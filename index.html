<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Board do Time — Foco Marketing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#EAEAEA;font-family:'Nunito Sans',sans-serif;min-height:100vh;}
    .app{max-width:1100px;margin:0 auto;padding:40px 32px 64px;}
    .header{background:#002055;border-radius:16px;padding:32px 40px;margin-bottom:40px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:space-between;}
    .header-arc{position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;border:28px solid rgba(0,87,217,0.35);pointer-events:none;}
    .header-arc2{position:absolute;bottom:-30px;right:60px;width:90px;height:90px;border-radius:50%;border:14px solid rgba(21,101,192,0.25);pointer-events:none;}
    .header-sq{position:absolute;top:-12px;left:-12px;width:52px;height:52px;background:#fff;border-radius:8px;opacity:0.08;pointer-events:none;}
    .h-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:28px;color:#fff;letter-spacing:-0.5px;}
    .h-sub{font-size:13px;font-weight:600;color:rgba(255,255,255,0.5);margin-top:4px;}
    .logo-wrap{display:flex;gap:6px;align-items:flex-start;}
    .lsq{width:16px;height:16px;background:rgba(255,255,255,0.22);border-radius:3px;}
    .lsq2{width:16px;height:16px;background:rgba(255,255,255,0.1);border-radius:3px;margin-left:-8px;margin-top:-8px;}
    .badge{display:inline-flex;align-items:center;gap:7px;background:#EBF2FF;color:#1565C0;font-weight:800;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;border-radius:6px;padding:5px 12px;margin-bottom:16px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px;}
    @media(max-width:720px){.grid{grid-template-columns:1fr;}.app{padding:20px 16px 48px;}}
    .card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,53,128,0.06);border:1px solid rgba(0,53,128,0.12);padding:24px 28px;}
    .card-title{font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;color:#002055;margin-bottom:3px;}
    .card-date{font-size:12px;font-weight:600;color:#1565C0;margin-bottom:16px;}
    .sec{font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#1565C0;margin-bottom:7px;margin-top:14px;}
    .items{list-style:none;display:flex;flex-direction:column;gap:6px;}
    .items li{font-size:13.5px;color:#2a3a5a;display:flex;gap:9px;align-items:flex-start;line-height:1.5;}
    .arr{color:#1565C0;font-weight:700;flex-shrink:0;}
    .div{height:1px;background:rgba(0,53,128,0.12);margin:12px 0;}
    .meta-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,53,128,0.06);border:1px solid rgba(0,53,128,0.12);padding:28px 32px;margin-bottom:40px;}
    .meta-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap;}
    .meta-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;color:#002055;}
    .meta-week{font-size:13px;font-weight:600;color:#1565C0;margin-top:3px;}
    .prog-area{display:flex;gap:20px;flex-wrap:wrap;}
    .prog{background:#EBF2FF;border-radius:10px;padding:11px 16px;min-width:108px;}
    .prog-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#1565C0;margin-bottom:4px;}
    .prog-track{background:rgba(21,101,192,0.15);border-radius:6px;height:6px;width:110px;margin-bottom:3px;}
    .prog-fill{background:#1565C0;border-radius:6px;height:6px;transition:width 0.4s;}
    .prog-pct{font-size:18px;font-weight:800;color:#002055;}
    .prog-frac{font-size:11px;font-weight:600;color:#5a6e8a;margin-top:1px;}
    .tbl{width:100%;border-collapse:collapse;margin-top:6px;}
    .tbl th{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#fff;background:#1565C0;padding:10px 14px;text-align:left;}
    .tbl th:nth-child(2),.tbl th:nth-child(3){text-align:center;width:100px;}
    .tbl td{font-size:13.5px;padding:11px 14px;border-bottom:1px solid rgba(0,53,128,0.12);color:#2a3a5a;vertical-align:middle;}
    .tbl tr:nth-child(even) td{background:#F4F7FB;}
    .tbl tr:last-child td{border-bottom:none;}
    .tbl td.ctr{text-align:center;}
    .chk-w{display:flex;align-items:center;justify-content:center;}
    .chk{width:22px;height:22px;border-radius:6px;border:2px solid rgba(0,53,128,0.12);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;user-select:none;}
    .chk.on{background:#1565C0;border-color:#1565C0;}
    .done{text-decoration:line-through;color:#90a4c0;}
    .btn{display:inline-flex;align-items:center;gap:8px;background:#1565C0;color:#fff;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:13px;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;transition:background 0.15s;}
    .btn:hover{background:#003580;}
    .btn:disabled{opacity:0.5;cursor:not-allowed;}
    .ghost{display:inline-flex;align-items:center;gap:6px;background:transparent;color:#1565C0;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:12px;border:1px solid rgba(21,101,192,0.3);border-radius:7px;padding:7px 14px;cursor:pointer;transition:all 0.15s;}
    .ghost:hover{background:#EBF2FF;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,32,85,0.3);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
    .modal{background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,32,85,0.18);padding:36px 36px 28px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;}
    .modal-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#002055;margin-bottom:20px;}
    .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#1565C0;margin-bottom:5px;display:block;}
    .inp{width:100%;border:1px solid rgba(0,53,128,0.12);border-radius:8px;padding:9px 12px;font-family:'Nunito Sans',sans-serif;font-size:13.5px;color:#002055;background:#F9FBFF;margin-bottom:14px;outline:none;}
    .inp:focus{border-color:#1565C0;}
    .form-row{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
    .cancel{background:transparent;border:1px solid rgba(0,53,128,0.12);border-radius:8px;padding:9px 18px;font-family:'Nunito Sans',sans-serif;font-weight:700;font-size:13px;color:#5a6e8a;cursor:pointer;}
    .auth-box{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,53,128,0.06);border:1px solid rgba(0,53,128,0.12);padding:40px;text-align:center;margin-bottom:32px;}
    .auth-title{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#002055;margin-bottom:10px;}
    .auth-sub{font-size:13.5px;color:#5a6e8a;margin-bottom:24px;line-height:1.6;}
    .toast{position:fixed;bottom:28px;right:28px;background:#002055;color:#fff;font-size:13px;font-weight:600;padding:12px 20px;border-radius:10px;box-shadow:0 4px 20px rgba(0,32,85,0.25);z-index:200;animation:fadeUp 0.2s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .empty{background:#fff;border-radius:14px;border:1px solid rgba(0,53,128,0.12);padding:36px;text-align:center;color:#5a6e8a;font-size:13.5px;margin-bottom:40px;}
    .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading{text-align:center;padding:60px 0;color:#1565C0;font-weight:600;font-size:14px;}
    .loading-spin{display:inline-block;width:24px;height:24px;border:3px solid rgba(21,101,192,0.2);border-top-color:#1565C0;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:10px;vertical-align:middle;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const GOOGLE_CLIENT_ID = "723537364495-6ki6660lnkbbop6elvs2aljp7lfmd5nj.apps.googleusercontent.com";
const SPREADSHEET_ID   = "1Sg687w5m7jfFoLtik7d6pVGUGgN4AUFHbDHsAKwFrsk";
const SCOPES           = "https://www.googleapis.com/auth/spreadsheets";
const SHEETS_BASE      = "https://sheets.googleapis.com/v4/spreadsheets";

const { useState, useEffect, useCallback } = React;

// ── Sheets helpers ─────────────────────────────────────────────────────────
async function sheetsGet(token, range) {
  const r = await fetch(`${SHEETS_BASE}/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!r.ok) throw new Error(await r.text());
  return (await r.json()).values || [];
}
async function sheetsUpdate(token, range, values) {
  const r = await fetch(`${SHEETS_BASE}/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`, {
    method: "PUT",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ range, majorDimension: "ROWS", values })
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sheetsAppend(token, range, values) {
  const r = await fetch(`${SHEETS_BASE}/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`, {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ range, majorDimension: "ROWS", values })
  });
  if (!r.ok) throw new Error(await r.text());
}

function parseMetas(rows) {
  if (!rows.length) return { semana: "", descricao: "", metas: [] };
  const data = rows.slice(1).filter(r => r[2]);
  return {
    semana: data[0]?.[0] || "",
    descricao: data[0]?.[1] || "",
    metas: data.map((r, i) => ({
      id: `m${i}`, row: i + 2,
      texto: r[2] || "",
      vinicius: r[3] === "TRUE",
      mavi: r[4] === "TRUE",
    }))
  };
}
function parseReunioes(rows) {
  if (!rows.length) return [];
  return rows.slice(1).filter(r => r[2]).map((r, i) => ({
    id: r[0] || String(i), row: i + 2,
    date: r[1] || "", title: r[2] || "",
    pauta: (r[3] || "").split("|").map(s => s.trim()).filter(Boolean),
    combinados: (r[4] || "").split("|").map(s => s.trim()).filter(Boolean),
  }));
}

// ── Componentes ────────────────────────────────────────────────────────────
function Chk({ checked, onChange }) {
  return (
    <div className={`chk${checked ? " on" : ""}`} onClick={onChange} role="checkbox" aria-checked={checked} tabIndex={0}
      onKeyDown={e => e.key === " " && onChange()}>
      {checked && (
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <polyline points="2,7 5.5,10.5 11,3" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
    </div>
  );
}

function Modal({ open, onClose, children }) {
  if (!open) return null;
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">{children}</div>
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return <div className="toast">{msg}</div>;
}

// ── App principal ──────────────────────────────────────────────────────────
function App() {
  const [token, setToken]         = useState(null);
  const [loading, setLoading]     = useState(false);
  const [saving, setSaving]       = useState(false);
  const [toast, setToast]         = useState("");
  const [meta, setMeta]           = useState({ semana: "", descricao: "", metas: [] });
  const [meetings, setMeetings]   = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [editing, setEditing]     = useState(null);
  const [form, setForm]           = useState({ title: "", date: "", pauta: "", combinados: "" });

  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3000); };

  // Captura token do hash após redirect OAuth
  useEffect(() => {
    const hash = window.location.hash;
    if (hash.includes("access_token")) {
      const p = new URLSearchParams(hash.slice(1));
      const t = p.get("access_token");
      if (t) { setToken(t); window.history.replaceState(null, "", window.location.pathname); }
    }
    // Tenta recuperar token salvo na sessão
    const saved = sessionStorage.getItem("foco_token");
    if (saved && !hash.includes("access_token")) setToken(saved);
  }, []);

  useEffect(() => { if (token) sessionStorage.setItem("foco_token", token); }, [token]);

  const signIn = () => {
    const params = new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: window.location.origin + window.location.pathname,
      response_type: "token",
      scope: SCOPES,
      prompt: "consent",
    });
    window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  };

  const loadAll = useCallback(async (t) => {
    setLoading(true);
    try {
      const [mr, rr] = await Promise.all([sheetsGet(t, "metas!A:E"), sheetsGet(t, "reunioes!A:E")]);
      setMeta(parseMetas(mr));
      setMeetings(parseReunioes(rr));
    } catch(e) {
      if (e.message.includes("401")) { setToken(null); sessionStorage.removeItem("foco_token"); }
      else notify("Erro ao carregar: " + e.message);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { if (token) loadAll(token); }, [token]);

  const toggleCheck = async (m, who) => {
    const nv = !m[who];
    setMeta(prev => ({ ...prev, metas: prev.metas.map(x => x.id === m.id ? { ...x, [who]: nv } : x) }));
    setSaving(true);
    try {
      const col = who === "vinicius" ? "D" : "E";
      await sheetsUpdate(token, `metas!${col}${m.row}`, [[nv ? "TRUE" : "FALSE"]]);
      notify("Salvo ✓");
    } catch(e) {
      notify("Erro: " + e.message);
      setMeta(prev => ({ ...prev, metas: prev.metas.map(x => x.id === m.id ? { ...x, [who]: !nv } : x) }));
    } finally { setSaving(false); }
  };

  const openNew = () => { setEditing(null); setForm({ title:"", date:"", pauta:"", combinados:"" }); setShowModal(true); };
  const openEdit = (m) => { setEditing(m); setForm({ title:m.title, date:m.date, pauta:m.pauta.join("\n"), combinados:m.combinados.join("\n") }); setShowModal(true); };

  const saveMeeting = async () => {
    if (!form.title || !form.date) return;
    const pauta = form.pauta.split("\n").map(s=>s.trim()).filter(Boolean).join(" | ");
    const comb  = form.combinados.split("\n").map(s=>s.trim()).filter(Boolean).join(" | ");
    setSaving(true);
    try {
      if (editing) {
        await sheetsUpdate(token, `reunioes!A${editing.row}:E${editing.row}`, [[editing.id, form.date, form.title, pauta, comb]]);
        notify("Reunião atualizada ✓");
      } else {
        await sheetsAppend(token, "reunioes!A:E", [[Date.now().toString(), form.date, form.title, pauta, comb]]);
        notify("Reunião salva ✓");
      }
      setShowModal(false);
      await loadAll(token);
    } catch(e) { notify("Erro: " + e.message); }
    finally { setSaving(false); }
  };

  const total   = meta.metas.length;
  const vinDone = meta.metas.filter(m => m.vinicius).length;
  const mavDone = meta.metas.filter(m => m.mavi).length;
  const vinPct  = total ? Math.round(vinDone/total*100) : 0;
  const mavPct  = total ? Math.round(mavDone/total*100) : 0;

  return (
    <div className="app">
      {/* HEADER */}
      <div className="header">
        <div className="header-sq"/>
        <div className="header-arc"/>
        <div className="header-arc2"/>
        <div>
          <div className="h-title">Board do Time</div>
          <div className="h-sub">Foco Marketing — reuniões, combinados e metas semanais</div>
        </div>
        <div className="logo-wrap"><div className="lsq"/><div className="lsq2"/></div>
      </div>

      {/* AUTH */}
      {!token && (
        <div className="auth-box">
          <div className="auth-title">Conectar ao Google Sheets</div>
          <div className="auth-sub">Autorize o acesso para que o board leia e salve<br/>os dados diretamente na sua planilha.</div>
          <button className="btn" onClick={signIn}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Entrar com Google
          </button>
        </div>
      )}

      {token && loading && (
        <div className="loading">
          <span className="loading-spin"/> Carregando dados da planilha...
        </div>
      )}

      {token && !loading && (
        <>
          {/* METAS */}
          <div className="badge">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#1565C0" strokeWidth="1.5"/><path d="M7 4v3l2 1.5" stroke="#1565C0" strokeWidth="1.5" strokeLinecap="round"/></svg>
            Metas da Semana
          </div>
          <div className="meta-card">
            <div className="meta-hd">
              <div>
                <div className="meta-title">Semana {meta.semana}</div>
                <div className="meta-week">{meta.descricao}</div>
              </div>
              <div className="prog-area">
                {[{name:"Vinícius",pct:vinPct,done:vinDone},{name:"Mavi",pct:mavPct,done:mavDone}].map(p=>(
                  <div className="prog" key={p.name}>
                    <div className="prog-name">{p.name}</div>
                    <div className="prog-track"><div className="prog-fill" style={{width:`${p.pct}%`}}/></div>
                    <div className="prog-pct">{p.pct}%</div>
                    <div className="prog-frac">{p.done} de {total} concluídas</div>
                  </div>
                ))}
              </div>
            </div>

            {meta.metas.length === 0 ? (
              <div style={{textAlign:"center",padding:"20px 0",color:"#5a6e8a",fontSize:13.5}}>
                Nenhuma meta encontrada. Adicione na aba <strong>metas</strong> da planilha.
              </div>
            ) : (
              <table className="tbl">
                <thead><tr><th>Meta</th><th>Vinícius</th><th>Mavi</th></tr></thead>
                <tbody>
                  {meta.metas.map(m=>(
                    <tr key={m.id}>
                      <td><span className={m.vinicius&&m.mavi?"done":""}>{m.texto}</span></td>
                      {["vinicius","mavi"].map(who=>(
                        <td key={who} className="ctr">
                          <div className="chk-w">
                            <Chk checked={m[who]} onChange={()=>toggleCheck(m,who)}/>
                          </div>
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            )}

            <div style={{marginTop:16,display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="ghost" onClick={()=>loadAll(token)} disabled={saving}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 6a5 5 0 1 0 1-3" stroke="#1565C0" strokeWidth="1.5" strokeLinecap="round"/><path d="M1 2v3h3" stroke="#1565C0" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                Atualizar
              </button>
              <button className="ghost" onClick={()=>{setToken(null);sessionStorage.removeItem("foco_token");}}>
                Sair
              </button>
            </div>
          </div>

          {/* REUNIÕES */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
            <div className="badge" style={{margin:0}}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1.5" y="2.5" width="11" height="9.5" rx="2" stroke="#1565C0" strokeWidth="1.5"/><path d="M4.5 1v3M9.5 1v3M1.5 6h11" stroke="#1565C0" strokeWidth="1.5" strokeLinecap="round"/></svg>
              Últimas Reuniões
            </div>
            <button className="btn" onClick={openNew} disabled={saving}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>
              Nova Reunião
            </button>
          </div>

          {meetings.length === 0 ? (
            <div className="empty">Nenhuma reunião registrada. Clique em <strong>Nova Reunião</strong> para começar.</div>
          ) : (
            <div className="grid">
              {meetings.map(m=>(
                <div className="card" key={m.id}>
                  <div className="card-title">{m.title}</div>
                  <div className="card-date">→ {m.date}</div>
                  <div className="div"/>
                  <div className="sec">Pauta</div>
                  <ul className="items">{m.pauta.map((it,i)=><li key={i}><span className="arr">→</span>{it}</li>)}</ul>
                  <div className="div"/>
                  <div className="sec">Combinados</div>
                  <ul className="items">{m.combinados.map((it,i)=><li key={i}><span className="arr">→</span>{it}</li>)}</ul>
                  <div style={{marginTop:16}}>
                    <button className="ghost" onClick={()=>openEdit(m)}>
                      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="#1565C0" strokeWidth="1.4" strokeLinejoin="round"/></svg>
                      Editar
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* MODAL */}
      <Modal open={showModal} onClose={()=>setShowModal(false)}>
        <div className="modal-title">{editing?"Editar Reunião":"Nova Reunião"}</div>
        <label className="lbl">Título</label>
        <input className="inp" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Ex: Alinhamento semanal"/>
        <label className="lbl">Data</label>
        <input className="inp" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} placeholder="Ex: 06/05/2025"/>
        <label className="lbl">Pauta (uma por linha)</label>
        <textarea className="inp" rows={4} value={form.pauta} onChange={e=>setForm(f=>({...f,pauta:e.target.value}))} placeholder={"Item 1\nItem 2"} style={{resize:"vertical"}}/>
        <label className="lbl">Combinados (um por linha)</label>
        <textarea className="inp" rows={4} value={form.combinados} onChange={e=>setForm(f=>({...f,combinados:e.target.value}))} placeholder={"Combinado 1\nCombinado 2"} style={{resize:"vertical"}}/>
        <div className="form-row">
          <button className="cancel" onClick={()=>setShowModal(false)}>Cancelar</button>
          <button className="btn" onClick={saveMeeting} disabled={saving}>
            {saving ? <><span className="spin"/> Salvando...</> : "Salvar na planilha"}
          </button>
        </div>
      </Modal>

      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
